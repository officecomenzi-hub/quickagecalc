name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Prepare public folder
        run: |
          mkdir -p public
          cp -r index.html robots.txt sitemap.xml favicon.ico social-card.jpg nav.js about age-difference birthday-countdown contact date-difference privacy retirement-calculator born-in-year pregnancy-due-date dog-age how-old-am-i-in-days how-old-am-i-in-weeks how-old-am-i-in-months how-old-am-i-in-hours how-old-am-i-in-minutes born-in-the-1960s age-questions age-in-any-year what-year-was-i-born what-generation-am-i public/
          cp -r born-pages/* public/

      - name: Apply global metadata annual updates analytics and homepage links
        run: |
          python - <<'PY'
          from datetime import datetime
          from html import escape
          from pathlib import Path
          import re

          current_year = datetime.utcnow().year
          image_url = "https://quickagecalc.com/social-card.jpg"
          measurement_id = "G-M2VQC91TBY"
          ad_placeholder_style = '<style id="qac-hide-ad-placeholders">.ad-slot{display:none!important;height:0!important;margin:0!important;padding:0!important;border:0!important;overflow:hidden!important}</style>'
          analytics_tag = f'''<!-- Google tag (gtag.js) -->
          <script async src="https://www.googletagmanager.com/gtag/js?id={measurement_id}"></script>
          <script id="qac-ga4">
            window.dataLayer = window.dataLayer || [];
            function gtag(){{dataLayer.push(arguments);}}
            gtag('js', new Date());
            gtag('config', '{measurement_id}');
          </script>'''
          homepage_schema = '''<script type="application/ld+json" id="qac-homepage-schema">
          {
            "@context": "https://schema.org",
            "@graph": [
              {
                "@type": "Organization",
                "@id": "https://quickagecalc.com/#organization",
                "name": "QuickAgeCalc",
                "url": "https://quickagecalc.com/",
                "logo": {
                  "@type": "ImageObject",
                  "url": "https://quickagecalc.com/social-card.jpg"
                }
              },
              {
                "@type": "WebSite",
                "@id": "https://quickagecalc.com/#website",
                "url": "https://quickagecalc.com/",
                "name": "QuickAgeCalc",
                "description": "Free online age and date calculators for exact ages, birthdays, date differences and related calculations.",
                "publisher": {
                  "@id": "https://quickagecalc.com/#organization"
                },
                "inLanguage": "en"
              }
            ]
          }
          </script>'''
          homepage_featured_style = '''<style id="qac-featured-tools-style">
          .qac-featured-tools{margin:0 0 20px}.qac-featured-tools h2{font-family:'Playfair Display',serif;font-size:1.45rem;margin-bottom:8px}.qac-featured-tools>p{color:var(--muted);font-size:14px;line-height:1.6;margin-bottom:14px}.qac-featured-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.qac-featured-card{display:block;background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:18px;text-decoration:none;color:var(--text);transition:border-color .2s,box-shadow .2s,transform .2s}.qac-featured-card:hover{border-color:var(--accent);box-shadow:var(--shadow);transform:translateY(-1px)}.qac-featured-icon{display:block;font-size:24px;margin-bottom:8px}.qac-featured-name{display:block;font-size:15px;font-weight:700;margin-bottom:4px}.qac-featured-desc{display:block;font-size:12px;line-height:1.5;color:var(--muted)}@media(max-width:540px){.qac-featured-grid{grid-template-columns:1fr}}
          </style>'''
          homepage_featured_section = '''<section class="qac-featured-tools" id="qac-featured-tools" aria-labelledby="qac-featured-title">
            <h2 id="qac-featured-title">Popular Age Tools</h2>
            <p>Answer common age questions for past years, future years, birth years and generations.</p>
            <div class="qac-featured-grid">
              <a class="qac-featured-card" href="/age-in-any-year/"><span class="qac-featured-icon" aria-hidden="true">📆</span><span class="qac-featured-name">Age in Any Year</span><span class="qac-featured-desc">Find your age on a past or future date.</span></a>
              <a class="qac-featured-card" href="/what-year-was-i-born/"><span class="qac-featured-icon" aria-hidden="true">🔎</span><span class="qac-featured-name">What Year Was I Born?</span><span class="qac-featured-desc">Calculate a birth year from an age.</span></a>
              <a class="qac-featured-card" href="/what-generation-am-i/"><span class="qac-featured-icon" aria-hidden="true">👥</span><span class="qac-featured-name">What Generation Am I?</span><span class="qac-featured-desc">Check whether you are Gen X, Millennial, Gen Z or Gen Alpha.</span></a>
              <a class="qac-featured-card" href="/age-questions/"><span class="qac-featured-icon" aria-hidden="true">💡</span><span class="qac-featured-name">Age Questions & Answers</span><span class="qac-featured-desc">Explore quick answers and the right calculator for each question.</span></a>
            </div>
          </section>'''

          old_2025_card = '<a class="year-link" href="/born-in-2025/"><span class="yl-year">2025</span><span class="yl-age">0 or 1 years old</span><span class="yl-gen gen-alpha">Gen Alpha</span></a>'
          new_2026_card = '<a class="year-link" href="/born-in-2026/"><span class="yl-year">2026</span><span class="yl-age">0 years old</span><span class="yl-gen gen-alpha">Gen Alpha</span></a>'

          for path in Path("public").rglob("*.html"):
              text = path.read_text(encoding="utf-8")

              text = re.sub(r'© 20\d{2} QuickAgeCalc', f'© {current_year} QuickAgeCalc', text)
              text = re.sub(r'&copy; 20\d{2} QuickAgeCalc', f'&copy; {current_year} QuickAgeCalc', text)
              text = re.sub(r'© 20\d{2} QuickCalcs', f'© {current_year} QuickCalcs', text)
              text = text.replace('max="2025"', f'max="{current_year}"')
              text = text.replace('bY > 2025', f'bY > {current_year}')
              text = text.replace('1960–2025', f'1960–{current_year}')
              text = text.replace('between 1960 and 2025', f'between 1960 and {current_year}')

              if path.as_posix().endswith('born-in-year/index.html') and new_2026_card not in text:
                  text = text.replace(old_2025_card, old_2025_card + '\n      ' + new_2026_card)

              if 'id="qac-hide-ad-placeholders"' not in text and "</head>" in text:
                  text = text.replace("</head>", ad_placeholder_style + "\n</head>", 1)

              if 'id="qac-ga4"' not in text and measurement_id not in text and "</head>" in text:
                  text = text.replace("</head>", analytics_tag + "\n</head>", 1)

              if path.as_posix() == 'public/index.html':
                  if 'id="qac-homepage-schema"' not in text and "</head>" in text:
                      text = text.replace("</head>", homepage_schema + "\n</head>", 1)
                  if 'id="qac-featured-tools-style"' not in text and "</head>" in text:
                      text = text.replace("</head>", homepage_featured_style + "\n</head>", 1)
                  if 'id="qac-featured-tools"' not in text:
                      footer_marker = '<footer>'
                      if footer_marker in text:
                          text = text.replace(footer_marker, homepage_featured_section + "\n\n  " + footer_marker, 1)
                      else:
                          text = text.replace('</body>', homepage_featured_section + '\n</body>', 1)

              title_match = re.search(r'<title>(.*?)</title>', text, re.IGNORECASE | re.DOTALL)
              description_match = re.search(r'<meta\s+name=["\']description["\']\s+content=["\'](.*?)["\']\s*/?>', text, re.IGNORECASE | re.DOTALL)
              canonical_match = re.search(r'<link\s+rel=["\']canonical["\']\s+href=["\'](.*?)["\']\s*/?>', text, re.IGNORECASE | re.DOTALL)

              page_title = re.sub(r'\s+', ' ', title_match.group(1)).strip() if title_match else 'QuickAgeCalc'
              page_description = re.sub(r'\s+', ' ', description_match.group(1)).strip() if description_match else 'Free online age and date calculators.'
              page_url = canonical_match.group(1).strip() if canonical_match else 'https://quickagecalc.com/'

              text = text.replace(
                  '<meta name="twitter:card" content="summary">',
                  '<meta name="twitter:card" content="summary_large_image">'
              )

              tags = []
              if 'property="og:site_name"' not in text:
                  tags.append('<meta property="og:site_name" content="QuickAgeCalc">')
              if 'property="og:type"' not in text:
                  tags.append('<meta property="og:type" content="website">')
              if 'property="og:title"' not in text:
                  tags.append(f'<meta property="og:title" content="{escape(page_title, quote=True)}">')
              if 'property="og:description"' not in text:
                  tags.append(f'<meta property="og:description" content="{escape(page_description, quote=True)}">')
              if 'property="og:url"' not in text:
                  tags.append(f'<meta property="og:url" content="{escape(page_url, quote=True)}">')
              if 'property="og:image"' not in text:
                  tags.extend([
                      f'<meta property="og:image" content="{image_url}">',
                      '<meta property="og:image:type" content="image/jpeg">',
                      '<meta property="og:image:width" content="400">',
                      '<meta property="og:image:height" content="210">',
                      '<meta property="og:image:alt" content="QuickAgeCalc free age and date calculators">',
                  ])
              if 'name="twitter:card"' not in text:
                  tags.append('<meta name="twitter:card" content="summary_large_image">')
              if 'name="twitter:title"' not in text:
                  tags.append(f'<meta name="twitter:title" content="{escape(page_title, quote=True)}">')
              if 'name="twitter:description"' not in text:
                  tags.append(f'<meta name="twitter:description" content="{escape(page_description, quote=True)}">')
              if 'name="twitter:image"' not in text:
                  tags.append(f'<meta name="twitter:image" content="{image_url}">')
              if 'name="twitter:image:alt"' not in text:
                  tags.append('<meta name="twitter:image:alt" content="QuickAgeCalc free age and date calculators">')
              if tags and "</head>" in text:
                  text = text.replace("</head>", "\n".join(tags) + "\n</head>", 1)

              path.write_text(text, encoding="utf-8")
          PY

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: '4.87.0'
          command: deploy
