<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact – QuickAgeCalc</title>
<meta name="description" content="Contact the QuickAgeCalc team. Send us feedback, report a bug, or ask a question.">
<link rel="canonical" href="https://quickagecalc.com/contact/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f8fa; --white: #ffffff; --border: #e2e6ea;
    --accent: #2563eb; --text: #1a202c; --muted: #6b7280;
    --shadow: 0 2px 12px rgba(0,0,0,0.07); --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Lato', sans-serif; background: var(--bg); color: var(--text); }
  header { background: var(--white); border-bottom: 1px solid var(--border); padding: 14px 0; margin-bottom: 40px; }
  header .inner { max-width: 760px; margin: 0 auto; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--accent); text-decoration: none; }
  .logo span { color: var(--text); }
  .wrap { max-width: 560px; margin: 0 auto; padding: 0 20px 60px; }
  .card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px; box-shadow: var(--shadow); }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 8px; }
  .subtitle { color: var(--muted); font-size: 15px; margin-bottom: 32px; font-weight: 300; }
  .field { margin-bottom: 18px; }
  .field label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; }
  .field input, .field textarea, .field select {
    width: 100%; padding: 12px 14px;
    border: 1.5px solid var(--border); border-radius: 8px;
    font-size: 15px; font-family: 'Lato', sans-serif;
    color: var(--text); background: var(--white);
    transition: border-color .2s; outline: none;
  }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); }
  .field textarea { height: 130px; resize: vertical; }
  .btn {
    width: 100%; padding: 14px; background: var(--accent);
    color: white; border: none; border-radius: 10px;
    font-size: 16px; font-weight: 700; font-family: 'Lato', sans-serif;
    cursor: pointer; transition: background .2s;
  }
  .btn:hover { background: #1d4ed8; }
  .or-email { text-align: center; margin-top: 24px; font-size: 14px; color: var(--muted); }
  .or-email a { color: var(--accent); }
  .success { display: none; text-align: center; padding: 20px; background: #f0fdf4; border: 1px solid #86efac; border-radius: 10px; margin-top: 20px; color: #16a34a; font-weight: 700; }
  footer { text-align: center; padding: 28px 0; font-size: 13px; color: var(--muted); border-top: 1px solid var(--border); margin-top: 32px; }
  footer a { color: var(--muted); text-decoration: none; margin: 0 8px; }
  footer a:hover { color: var(--accent); }
</style>
</head>
<body>
<header>
  <div class="inner">
    <a class="logo" href="/"><span>Quick</span>AgeCalc</a>
    <a href="/" style="font-size:13px;color:var(--muted);text-decoration:none;">← Back to Calculator</a>
  </div>
</header>
<div class="wrap">
  <div class="card">
    <h1>Contact Us</h1>
    <p class="subtitle">Have a question, suggestion, or found a bug? We'd love to hear from you.</p>

    <div class="field">
      <label>Your Name</label>
      <input type="text" id="name" placeholder="John Smith">
    </div>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="john@example.com">
    </div>
    <div class="field">
      <label>Subject</label>
      <select id="subject">
        <option value="">Select a topic...</option>
        <option>General Question</option>
        <option>Bug Report</option>
        <option>Feature Request</option>
        <option>Other</option>
      </select>
    </div>
    <div class="field">
      <label>Message</label>
      <textarea id="message" placeholder="Write your message here..."></textarea>
    </div>
    <button class="btn" onclick="submitForm()">Send Message →</button>
    <div class="success" id="successMsg">✅ Message sent! We'll get back to you within 48 hours.</div>
    <div class="or-email">
      Or email us directly at <a href="mailto:hello@quickagecalc.com">hello@quickagecalc.com</a>
    </div>
  </div>
</div>
<footer>
  <a href="/">Home</a>
  <a href="/about/">About</a>
  <a href="/privacy/">Privacy Policy</a>
  <a href="/contact/">Contact</a>
  <p style="margin-top:10px">© 2025 QuickCalcs · quickagecalc.com</p>
</footer>
<script>
function submitForm() {
  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const message = document.getElementById('message').value;
  if (!name || !email || !message) { alert('Please fill in all required fields.'); return; }
  // In production, connect this to Formspree or similar
  document.getElementById('successMsg').style.display = 'block';
}
</script>
</body>
</html>
